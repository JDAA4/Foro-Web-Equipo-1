<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
<link rel="stylesheet" type="text/css" href="/src/css/styles-registre.css">
</head>
<body>

<div class="container">
    <div class="image-container">
        <h1>Comunidad global, impacto local</h1>
    </div>
    <div class="form-container">
        <img src="/src/images/Foro.png" class="logo">
        <h2>Registrarse en Sheresphere</h2>
        <form>
            <input type="name" placeholder="Nombre" required>
            <input type="lastname" placeholder="Apellido" required>
            <input type="name-user" placeholder="Nombre de Usuario" required>
            <input type="email" placeholder="Correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <input type="password" placeholder="Confirmar contraseña" required>
            <input type="submit" value="Registrarse">
            <p class="login-link">¿Ya tienes una cuenta? <br>
                <a href="/src/views/login.html">Inicia sesión aquí</a></p>
        </form>
    </div>
</div>

</body>
</html>
